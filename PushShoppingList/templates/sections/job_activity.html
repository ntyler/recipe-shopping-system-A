<section id="jobActivitySection"
         class="{% if not job_activity_account_panel|default(false) %}app-card {% endif %}job-activity-card{% if job_activity_account_panel|default(false) %} user-job-activity-panel{% endif %}"
         data-job-activity-panel
         data-admin-job-view="{{ '1' if current_user and current_user.is_admin else '0' }}"
         aria-live="polite"
         {% if job_activity_account_panel|default(false) %}hidden{% endif %}>
    {% if job_activity_account_panel|default(false) %}
        <div class="app-section-divider recipe-entry-section-divider user-job-activity-divider" aria-hidden="true"></div>
    {% endif %}
    <div class="job-activity-header recipe-url-log-header{% if job_activity_account_panel|default(false) %} user-push-panel-header user-job-activity-header{% endif %}">
        <button type="button"
                class="card-collapse-toggle recipe-url-log-toggle job-activity-toggle"
                data-collapse-toggle="job-activity"
                aria-expanded="true"
                onclick="toggleCardCollapse('job-activity')">
            <span class="cookbooks-header-title recipe-url-log-header-title">
                Job Activity / Import Progress
            </span>
            <span class="job-activity-header-live"
                  data-job-activity-header-summary>
                No active jobs.
            </span>
        </button>
        {% if job_activity_account_panel|default(false) %}
            <button type="button"
                    class="secondary user-push-panel-close user-job-activity-close"
                    data-job-activity-close
                    onclick="return closeJobActivityPanel()">
                Close
            </button>
        {% endif %}
    </div>
    <div class="card-collapse-content job-activity-content"
         data-collapse-content="job-activity"
         data-collapse-default="expanded"
         data-collapse-mobile-default="collapsed">
        <div class="job-activity-toolbar">
            <button type="button"
                    class="secondary job-activity-refresh"
                    onclick="return refreshJobActivityPanel({ force: true })">
                Refresh
            </button>
            <button type="button"
                    class="secondary job-activity-filter-active"
                    data-job-activity-active-filter
                    aria-pressed="false"
                    onclick="return toggleJobActivityActiveFilter(this)">
                Active Only
            </button>
            <button type="button"
                    class="secondary job-activity-cancel-all danger"
                    data-job-activity-cancel-all
                    onclick="return cancelAllJobActivityJobs(this)"
                    disabled>
                Cancel All Active
            </button>
            <button type="button"
                    class="secondary job-activity-clear"
                    data-job-activity-clear
                    onclick="return clearJobActivityLog(this)"
                    disabled>
                Clear Log
            </button>
        </div>
        <div class="job-activity-filters">
            <div class="job-activity-segment" role="group" aria-label="Item status filter">
                <button type="button"
                        class="job-activity-item-filter is-active"
                        data-job-activity-item-filter="all"
                        aria-pressed="true"
                        onclick="return setJobActivityItemFilter('all')">
                    All Items
                </button>
                <button type="button"
                        class="job-activity-item-filter"
                        data-job-activity-item-filter="passed"
                        aria-pressed="false"
                        onclick="return setJobActivityItemFilter('passed')">
                    Passed Items
                </button>
                <button type="button"
                        class="job-activity-item-filter"
                        data-job-activity-item-filter="failed"
                        aria-pressed="false"
                        onclick="return setJobActivityItemFilter('failed')">
                    Failed Items
                </button>
            </div>
            <div class="job-activity-date-filters" aria-label="Activity date filter">
                <label>
                    <span>From</span>
                    <input type="date"
                           data-job-activity-date-from
                           onchange="return setJobActivityDateFilter()">
                </label>
                <label>
                    <span>To</span>
                    <input type="date"
                           data-job-activity-date-to
                           onchange="return setJobActivityDateFilter()">
                </label>
                <button type="button"
                        class="job-activity-date-clear"
                        data-job-activity-date-clear
                        onclick="return clearJobActivityDateFilter()"
                        disabled>
                    Clear Dates
                </button>
            </div>
        </div>
        <div class="job-activity-summary" data-job-activity-summary>
            No active jobs.
        </div>
        <div class="job-activity-list" data-job-activity-list>
            <div class="job-activity-empty">No recent jobs.</div>
        </div>
    </div>
</section>
