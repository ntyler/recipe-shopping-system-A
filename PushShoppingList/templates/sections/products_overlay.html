<div class="product-modal-backdrop" id="productsOverlay" style="display:none;">
    <div class="product-choice-card" role="dialog" aria-modal="true">
        <div class="product-choice-header">
            <div class="product-choice-title-row">
                <div style="width:52px;"></div>
                <h2>Grabbing Best Products</h2>
                <button type="button" class="product-close-btn" onclick="hideProductsOverlay()">Hide</button>
            </div>

            <p class="product-choice-subtitle">
                Product search results will appear here.
            </p>
            <div id="productsStatusText" class="bulk-active-line">Ready.</div>
            <div class="bulk-progress-bar-wrap">
                <div id="productsProgressBar" class="bulk-progress-bar"></div>
            </div>
            <div id="productsSummary" class="bulk-progress-store-line"></div>
            <div id="productsList" class="bulk-preview-list"></div>
        </div>
    </div>
</div>
