<div id="itemQtyModal" class="item-qty-modal-backdrop" style="display:none;" aria-hidden="true">
    <div class="item-qty-modal-card" role="dialog" aria-modal="true" aria-labelledby="itemQtyModalTitle">
        <div class="item-qty-modal-header">
            <h2 id="itemQtyModalTitle">
                <span id="itemQtyTitleName" class="item-qty-title-name"></span>
                <span class="item-qty-title-action">Edit Qty</span>
            </h2>
            <button type="button" class="item-qty-close-btn" onclick="closeItemQtyEditor()">Close</button>
        </div>

        <form id="itemQtyForm" onsubmit="return saveItemQtyOverride(event)">
            <input type="hidden" id="itemQtyKeyInput" name="item_key">

            <div class="item-qty-field">
                <label>Recipe Ingredient</label>
                <div id="itemQtyName" class="item-qty-readonly"></div>
            </div>

            <div class="item-qty-field">
                <label for="itemQtyBuyAsInput">Buy As</label>
                <input id="itemQtyBuyAsInput"
                       name="purchasable_item"
                       type="text"
                       list="itemQtyBuyAsOptions"
                       placeholder="e.g. eggs, garlic, parmesan cheese">
                <datalist id="itemQtyBuyAsOptions">
                    <option value="eggs"></option>
                    <option value="garlic"></option>
                    <option value="butter"></option>
                    <option value="parmesan cheese"></option>
                    <option value="lemons"></option>
                </datalist>
            </div>

            <div class="item-qty-field">
                <label>Recipe Amount</label>
                <div id="itemQtyCurrent" class="item-qty-readonly muted">No recipe amount found.</div>
            </div>

            <div id="itemQtySources" class="item-qty-sources" hidden></div>

            <div class="item-qty-field">
                <label for="itemQtyManualInput">Manual qty</label>
                <input id="itemQtyManualInput"
                       name="manual_qty"
                       type="text"
                       placeholder="e.g. 1 bottle, 2 cups, 12 oz">
            </div>

            <div class="item-qty-help">
                Leave manual qty blank to go back to the recipe value.
            </div>

            <div class="item-qty-actions">
                <button type="submit" class="item-qty-save-btn">Save Qty</button>
                <button type="button" class="item-qty-clear-btn" onclick="clearItemQtyOverride()">Use Recipe Value</button>
            </div>
        </form>
    </div>
</div>
