<div class="recipe-card">
    <h2>Enter Recipe Links</h2>
    <p class="helper-text">Paste one recipe URL per line</p>

    <form id="extractRecipeForm" onsubmit="startRecipeExtraction(event)">
        <textarea
            class="recipe-url-box"
            id="recipeUrlsTextarea"
            name="recipe_urls"
            placeholder="https://www.forkinthekitchen.com/homemade-cheese-ravioli/&#10;https://www.forkinthekitchen.com/homemade-crispy-falafel/"></textarea>

        <button class="extract-btn" type="submit">Extract Ingredients</button>
    </form>

    <form id="recipeMediaUploadForm"
          class="recipe-media-upload-form"
          method="POST"
          action="/upload_recipe_media"
          enctype="multipart/form-data"
          onsubmit="saveScroll()">
        <input id="recipeMediaUploadInput"
               name="recipe_media"
               type="file"
               onchange="submitRecipeMediaUpload(this)"
               hidden>
        <button class="recipe-media-upload-btn" type="button" onclick="openRecipeMediaUpload()">
            Extract Ingredients from Photo or Document
        </button>
        <div id="recipeMediaUploadStatus" class="recipe-media-upload-status" aria-live="polite"></div>
    </form>
</div>
