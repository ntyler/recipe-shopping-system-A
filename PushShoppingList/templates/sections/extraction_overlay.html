<div class="product-modal-backdrop extract-old-backdrop"
     id="extractProgressModalBackdrop"
     aria-hidden="true">

    <div class="product-choice-card extract-old-card"
         role="dialog"
         aria-modal="true">

        <div class="product-choice-header extract-old-header">
            <div class="product-choice-title-row extract-old-title-row">

                <div class="extract-old-spacer"></div>

                <div class="extract-old-title-wrap">
                    <h2 id="extractProgressTitle">Extracting<br class="mobile-title-break"> Ingredients</h2>

                    <p class="product-choice-subtitle extract-old-subtitle">
                        Your recipes are being processed. This page will update when extraction finishes.
                    </p>
                </div>

                <button type="button"
                        class="product-close-btn extract-top-hide-btn"
                        onclick="hideExtractProgressModal()">
                    Hide
                </button>

            </div>
        </div>

        <div class="bulk-progress-status extract-old-status-card">

            <div id="extractSpinner"
                 class="bulk-spinner extract-old-spinner"></div>

            <div class="bulk-active-line extract-old-active-line">
                Status:
                <span id="extractStatusText"
                      class="bulk-active-ingredient">
                    Starting...
                </span>
            </div>

            <div id="extractSummary"
                 class="product-choice-subtitle extract-old-summary">
                Preparing extraction...
            </div>

            <div id="extractPercentText"
                 class="extract-old-percent"
                 aria-live="polite">
                0% complete
            </div>

            <div id="extractProgressTrack"
                 class="bulk-progress-bar-wrap extract-old-progress-wrap"
                 role="progressbar"
                 aria-labelledby="extractPercentText"
                 aria-valuemin="0"
                 aria-valuemax="100"
                 aria-valuenow="0"
                 aria-valuetext="0% complete">
                <div id="extractProgressBar"
                     class="bulk-progress-bar extract-old-progress-bar"
                     style="width:0%;">
                </div>
                <span id="extractProgressBarLabel"
                      class="extract-old-progress-label"
                      aria-hidden="true">0%</span>
            </div>

        </div>

        <div id="menuImportActivityPanel"
             class="menu-import-activity-panel"
             hidden>
            <div class="menu-import-activity-kicker">Live Menu Activity</div>
            <div id="menuImportActivityStage"
                 class="menu-import-activity-stage">
            </div>
            <div id="menuImportActivityDetail"
                 class="menu-import-activity-detail">
            </div>
            <div id="menuImportActivityCounts"
                 class="menu-import-activity-counts">
            </div>
            <div id="menuImportActivityModel"
                 class="menu-import-activity-model">
            </div>
        </div>

        <div id="extractUrlList"
             class="bulk-preview-list extract-old-url-list">
        </div>

        <div class="bulk-modal-actions extract-old-actions">
            <button type="button"
                    id="redoMissingExtractBtn"
                    class="bulk-secondary-btn extract-redo-missing-btn"
                    onclick="redoMissingRecipeExtraction()"
                    style="display:none;">
                Redo Missing
            </button>

            <button type="button"
                    id="cancelExtractBtn"
                    class="bulk-secondary-btn extract-cancel-btn"
                    onclick="cancelRecipeExtraction()"
                    style="display:none;">
                Cancel
            </button>

            <button type="button"
                    class="bulk-secondary-btn extract-bottom-hide-btn"
                    onclick="hideExtractProgressModal()">
                Hide
            </button>
        </div>

    </div>
</div>
