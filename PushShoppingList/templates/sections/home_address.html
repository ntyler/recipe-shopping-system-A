<div class="app-card" id="home-address-section">
    <button type="button"
            class="card-collapse-toggle"
            data-collapse-toggle="home-address"
            aria-expanded="false"
            onclick="toggleCardCollapse('home-address')">
        <span>Home Address</span>
        <span class="card-collapse-icon" data-collapse-icon="home-address">Show v</span>
    </button>

    <div class="card-collapse-content home-address-content collapsed"
         data-collapse-content="home-address"
         data-collapse-default="collapsed">
        <p class="helper-text">
            This address is used by <strong>Run Find Nearest Stores</strong> and <strong>update_home_stores.py</strong>, then saved into
            <strong>PushShoppingList/shopping_stores_Results.json</strong>.
        </p>

        <form id="homeAddressForm" method="POST" action="/save_home_address" onsubmit="return saveHomeAddress(event);">
            <div class="address-grid">
                <input name="address_street" value="{{ home_address.street }}" placeholder="Street, e.g. 5905 Arlo Drive">
                <input name="address_apartment" value="{{ home_address.apartment }}" placeholder="Apartment, e.g. Apt 2213">
                <input name="address_city" value="{{ home_address.city }}" placeholder="City, e.g. Indianapolis">
                <input name="address_county" value="{{ home_address.county }}" placeholder="County, e.g. Marion County">
                <input name="address_state" value="{{ home_address.state }}" placeholder="State, e.g. IN">
                <input name="address_zip" value="{{ home_address.zip }}" placeholder="ZIP">
                <input name="address_country" value="{{ home_address.country }}" placeholder="Country, e.g. United States">
            </div>

            <div class="address-summary-box">
                <span class="store-detail-label">Current full address</span>
                <span id="homeAddressSummary">{{ home_address.full_address }}</span>
            </div>

            <div class="address-actions-grid home-address-actions-copy">
                <button type="submit" name="action" value="save" class="address-save-btn">Save Address</button>
                <button type="button"
                        class="location-address-btn"
                        onclick="useDeviceLocationForHomeAddress(this)">
                    Use My Location
                </button>
            </div>

        </form>
    </div>

    <div class="home-address-collapsed-summary">
        <span class="store-detail-label">Current full address</span>
        <span id="homeAddressCollapsedSummary">{{ home_address.full_address or "No home address saved." }}</span>
    </div>
</div>
