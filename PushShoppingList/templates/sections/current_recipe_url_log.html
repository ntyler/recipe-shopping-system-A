<div class="app-card">
    <h2>Current Recipe URL Log</h2>

    {% if current_urls %}
        <div class="log-box">
            <div class="recipe-log-header">
                <span>Recipe</span>
                <span>Name</span>
                <span>Type</span>
                <span>Qty</span>
                <span></span>
                <span></span>
            </div>
        {% for recipe in current_urls %}
            <div class="recipe-row">
                <a class="recipe-label recipe-url-link"
                   href="{{ recipe.url }}"
                   target="_blank"
                   rel="noopener noreferrer">Recipe {{ loop.index }}</a>

                <input type="text"
                       class="recipe-name-input"
                       value="{{ recipe.name }}"
                       data-recipe-url="{{ recipe.url }}"
                       aria-label="Recipe {{ loop.index }} name">

                <span class="recipe-type-pill recipe-type-{{ recipe.type|lower }}">{{ recipe.type }}</span>

                <div class="recipe-quantity-control">
                    <span>Qty</span>
                    <input type="number"
                           class="recipe-quantity-input"
                           min="1"
                           step="1"
                           value="{{ recipe.quantity }}"
                           data-recipe-number="{{ loop.index }}"
                           data-recipe-url="{{ recipe.url }}">
                </div>

                <div class="recipe-row-actions">
                    <button type="button"
                            class="edit-recipe-btn"
                            data-recipe-url="{{ recipe.url }}"
                            onclick="openRecipeEditor(this)">
                        Edit
                    </button>
                </div>

                <form method="POST"
                      action="{{ url_for('recipe_bp.remove_recipe_route') }}"
                      class="remove-recipe-form"
                      onsubmit="saveScroll(); return confirm('Remove this recipe URL?');">
                    <input type="hidden" name="url" value="{{ recipe.url }}">
                    <button type="submit" class="remove-recipe-btn" aria-label="Remove recipe">X</button>
                </form>
            </div>
        {% endfor %}
        </div>

        <button type="button"
                class="save-recipe-qty-btn"
                onclick="saveAllRecipeQuantities(this)">
            Save Qty
        </button>
    {% else %}
        <div class="log-box">No current recipe URLs yet.</div>
    {% endif %}
</div>

<div id="recipeEditModal"
     class="recipe-edit-backdrop"
     aria-hidden="true">
    <div class="recipe-edit-dialog" role="dialog" aria-modal="true" aria-labelledby="recipeEditTitle">
        <form id="recipeEditForm" onsubmit="return saveRecipeEditor(event)">
            <div class="recipe-edit-header">
                <h2 id="recipeEditTitle">Edit Recipe</h2>
                <button type="button" class="recipe-edit-close" onclick="closeRecipeEditor()">Close</button>
            </div>

            <input type="hidden" name="original_url" id="recipeEditOriginalUrl">

            <div id="recipeEditStatus" class="recipe-edit-status"></div>

            <div class="recipe-edit-grid">
                <label>
                    <span>Display Name</span>
                    <input type="text" name="display_name" id="recipeEditDisplayName">
                </label>
                <label>
                    <span>Recipe Title</span>
                    <input type="text" name="recipe_title" id="recipeEditTitleInput">
                </label>
                <label class="recipe-edit-wide">
                    <span>Source URL</span>
                    <input type="text" name="source_url" id="recipeEditSourceUrl">
                </label>
                <label>
                    <span>Quantity</span>
                    <input type="number" min="1" step="1" name="quantity" id="recipeEditQuantity">
                </label>
                <label>
                    <span>Servings</span>
                    <input type="text" name="servings" id="recipeEditServings">
                </label>
            </div>

            <section class="recipe-edit-section">
                <div class="recipe-edit-section-header">
                    <h3>Ingredients</h3>
                    <button type="button" onclick="addRecipeIngredientRow()">Add Ingredient</button>
                </div>
                <div id="recipeEditIngredients" class="recipe-edit-ingredients"></div>
            </section>

            <section class="recipe-edit-section">
                <div class="recipe-edit-section-header">
                    <h3>Equipment</h3>
                    <button type="button" onclick="addRecipeEquipmentRow()">Add Equipment</button>
                </div>
                <div id="recipeEditEquipment" class="recipe-edit-equipment"></div>
            </section>

            <section class="recipe-edit-section">
                <div class="recipe-edit-section-header">
                    <h3>Instructions</h3>
                    <button type="button" onclick="addRecipeInstructionRow()">Add Step</button>
                </div>
                <div id="recipeEditInstructions" class="recipe-edit-instructions"></div>
            </section>

            <section class="recipe-edit-section">
                <div class="recipe-edit-section-header">
                    <h3>Nutrition</h3>
                    <button type="button" onclick="addRecipeNutritionRow()">Add Nutrition</button>
                </div>
                <div id="recipeEditNutrition" class="recipe-edit-nutrition"></div>
            </section>

            <div class="recipe-edit-actions">
                <button type="button" class="recipe-edit-cancel" onclick="closeRecipeEditor()">Cancel</button>
                <button type="submit" class="recipe-edit-save">Save Recipe</button>
            </div>
        </form>
    </div>
</div>
