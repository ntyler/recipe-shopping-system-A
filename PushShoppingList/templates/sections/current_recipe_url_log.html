<div class="app-card">
    <h2>Current Recipe URL Log</h2>

    {% if current_urls %}
        <div class="log-box">
        {% for recipe in current_urls %}
            <div class="recipe-row">
                <div class="recipe-left">
                    <span class="recipe-label">Recipe {{ loop.index }}:</span>
                    <a href="{{ recipe.url }}" target="_blank">{{ recipe.name }}</a>
                </div>

                <div class="recipe-quantity-control">
                    <span>Qty</span>
                    <button type="button"
                            class="recipe-quantity-step"
                            data-step="-1"
                            aria-label="Decrease recipe quantity">
                        -
                    </button>
                    <input type="number"
                           class="recipe-quantity-input"
                           min="1"
                           step="1"
                           value="{{ recipe.quantity }}"
                           data-recipe-number="{{ loop.index }}"
                           data-recipe-url="{{ recipe.url }}">
                    <button type="button"
                            class="recipe-quantity-step"
                            data-step="1"
                            aria-label="Increase recipe quantity">
                        +
                    </button>
                </div>

                <form method="POST"
                      action="{{ url_for('recipe_bp.remove_recipe_route') }}"
                      class="remove-recipe-form"
                      onsubmit="saveScroll(); return confirm('Remove this recipe URL?');">
                    <input type="hidden" name="url" value="{{ recipe.url }}">
                    <button type="submit" class="remove-recipe-btn">Remove</button>
                </form>
            </div>
        {% endfor %}
        </div>
    {% else %}
        <div class="log-box">No current recipe URLs yet.</div>
    {% endif %}
</div>
