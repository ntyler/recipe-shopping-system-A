<div class="app-card view-settings-card">
    <h2>View &amp; Behavior</h2>
    <p class="helper-text">Choose how the list is displayed, how buttons behave, and manage resets.</p>

    <div hidden aria-hidden="true">
        <input type="checkbox" id="openStoreUrlsToggle" checked onchange="saveOpenStoreUrlsSetting()">
        <input type="checkbox" id="showItemButtonsToggle" checked onchange="saveShowItemButtonsSetting()">
        <input type="checkbox" id="showBestProductToggle" checked onchange="saveShowBestProductSetting()">
        <input type="checkbox" id="showQtyToggle" checked onchange="saveShowQtySetting()">
        <input type="checkbox" id="hideCheckedItemsToggle" onchange="saveHideCheckedItemsSetting()">
        <input type="checkbox" id="compactModeToggle" onchange="saveCompactModeSetting()">
    </div>

    <div class="view-control-section">
        <div class="view-control-title">Product Tools</div>
        <div class="view-control-row">
            <form class="view-action-form" method="POST" action="/preview_grab_best_products" onsubmit="return grabBestProducts(event);">
                <button type="submit" class="grab-products-btn view-action-btn">Grab Best Products</button>
            </form>

            <button type="button" class="grab-products-btn view-action-btn" onclick="openTestGrabAldiModal(this)">Test Grab ALDI</button>

            <form class="view-action-form" method="POST" action="/clear_product_picks" onsubmit="return clearProductPicks(event);">
                <button type="submit" class="clear-products-btn view-action-btn">Clear Product Picks</button>
            </form>
        </div>
    </div>

</div>

<div id="viewSwitcherSticky" class="view-switcher-sticky" aria-label="Display View">
    <div class="view-toggle-box view-control-row">
        <span class="view-toggle-label">View:</span>
        <button type="button"
                id="sectionViewBtn"
                class="view-toggle-btn"
                aria-pressed="false"
                onclick="showView('section')">
            Section
        </button>
        <button type="button"
                id="storeViewBtn"
                class="view-toggle-btn"
                aria-pressed="false"
                onclick="showView('store')">
            Store
        </button>
        <button type="button"
                id="recipeViewBtn"
                class="view-toggle-btn"
                aria-pressed="false"
                onclick="showView('recipe')">
            Recipe
        </button>
    </div>
    <div class="recipe-view-global-menu-wrap recipe-edit-row-menu-wrap">
        <button type="button"
                class="recipe-edit-row-menu-btn recipe-view-global-menu-btn"
                aria-label="View actions"
                aria-haspopup="true"
                aria-expanded="false"
                onclick="return toggleRecipeEditRowMenu(this, event)">
            <span aria-hidden="true"></span>
        </button>
        <div class="recipe-edit-row-menu overflow-menu recipe-view-global-menu" hidden>
            <div class="overflow-menu-section recipe-view-menu-section">
                <div class="overflow-menu-section-title recipe-view-menu-section-title">Button Behavior</div>
                <button type="button"
                        class="recipe-view-behavior-toggle"
                        data-view-behavior-input="openStoreUrlsToggle"
                        aria-pressed="true"
                        onclick="return toggleViewBehaviorMenuSetting(this)">
                    Open store URLs
                </button>
                <button type="button"
                        class="recipe-view-behavior-toggle"
                        data-view-behavior-input="showItemButtonsToggle"
                        aria-pressed="true"
                        onclick="return toggleViewBehaviorMenuSetting(this)">
                    Show item buttons
                </button>
                <button type="button"
                        class="recipe-view-behavior-toggle"
                        data-view-behavior-input="showBestProductToggle"
                        aria-pressed="true"
                        onclick="return toggleViewBehaviorMenuSetting(this)">
                    Show best product
                </button>
                <button type="button"
                        class="recipe-view-behavior-toggle"
                        data-view-behavior-input="showQtyToggle"
                        aria-pressed="true"
                        onclick="return toggleViewBehaviorMenuSetting(this)">
                    Show qty
                </button>
                <button type="button"
                        class="recipe-view-behavior-toggle"
                        data-view-behavior-input="hideCheckedItemsToggle"
                        aria-pressed="false"
                        onclick="return toggleViewBehaviorMenuSetting(this)">
                    Hide checked items
                </button>
                <button type="button"
                        class="recipe-view-behavior-toggle"
                        data-view-behavior-input="compactModeToggle"
                        aria-pressed="false"
                        onclick="return toggleViewBehaviorMenuSetting(this)">
                    Compact mode
                </button>
            </div>
            <div class="overflow-menu-section recipe-view-menu-section">
                <div class="overflow-menu-section-title recipe-view-menu-section-title">Recipe Display</div>
                <button type="button"
                        onclick="return setAllRecipeImagesVisibleFromMenu(this, true)">
                    Show All Images
                </button>
                <button type="button"
                        onclick="return setAllRecipeImagesVisibleFromMenu(this, false)">
                    Hide All Images
                </button>
                <button type="button"
                        onclick="return setAllRecipeViewEverythingCollapsed(false)">
                    Expand Everything
                </button>
                <button type="button"
                        onclick="return setAllRecipeViewEverythingCollapsed(true)">
                    Collapse Everything
                </button>
            </div>
            <div class="overflow-menu-section recipe-view-menu-section">
                <div class="overflow-menu-section-title recipe-view-menu-section-title">Image Generation</div>
                <div class="recipe-view-generate-submenu-row">
                    <button type="button"
                            class="recipe-view-generate-submenu-toggle"
                            aria-haspopup="true"
                            aria-expanded="false"
                            onclick="return toggleRecipeViewGenerateSubmenu(this, event)">
                        Generate All Images
                    </button>
                    <div class="overflow-submenu recipe-view-generate-submenu" hidden>
                        <div class="overflow-menu-section-title recipe-view-menu-section-title">Generate By Section</div>
                        <button type="button"
                                data-recipe-image-global-btn
                                onclick="return generateAllRecipeImagesFromViewBehavior(this, { imageScope: 'all' })">
                            All Recipe Images
                        </button>
                        <button type="button"
                                data-recipe-image-global-btn
                                onclick="return generateAllRecipeImagesFromViewBehavior(this, { imageScope: 'equipment' })">
                            Equipment Images
                        </button>
                        <button type="button"
                                data-recipe-image-global-btn
                                onclick="return generateAllRecipeImagesFromViewBehavior(this, { imageScope: 'instructions' })">
                            Instruction Step Images
                        </button>
                    </div>
                </div>
                <div class="recipe-view-generate-submenu-row">
                    <button type="button"
                            class="recipe-view-generate-submenu-toggle"
                            aria-haspopup="true"
                            aria-expanded="false"
                            onclick="return toggleRecipeViewGenerateSubmenu(this, event)">
                        Generate Missing Images
                    </button>
                    <div class="overflow-submenu recipe-view-generate-submenu" hidden>
                        <div class="overflow-menu-section-title recipe-view-menu-section-title">Generate By Section</div>
                        <button type="button"
                                data-recipe-image-global-btn
                                onclick="return generateAllRecipeImagesFromViewBehavior(this, { missingOnly: true, imageScope: 'all' })">
                            All Recipe Images
                        </button>
                        <button type="button"
                                data-recipe-image-global-btn
                                onclick="return generateAllRecipeImagesFromViewBehavior(this, { missingOnly: true, imageScope: 'equipment' })">
                            Equipment Images
                        </button>
                        <button type="button"
                                data-recipe-image-global-btn
                                onclick="return generateAllRecipeImagesFromViewBehavior(this, { missingOnly: true, imageScope: 'instructions' })">
                            Instruction Step Images
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
