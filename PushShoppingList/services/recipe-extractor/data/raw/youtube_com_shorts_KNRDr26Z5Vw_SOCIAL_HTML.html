 fat loss challenge\n\nOf course this was delicious.\nIt’s pizza. 🍕\nHigh protein. Stuffed crust. Zero regrets.\n\n⸻\n\nIngredients\n\n110g self-raising flour\nIf using plain flour add 1.5 tsp baking powder\n\n100g low fat or fat free Greek yoghurt\n\n1 tsp Italian herb seasoning\n1 tsp garlic powder\n1 tsp salt\n\n7g nutritional yeast optional\n\n3 light mozzarella cheese sticks sliced lengthways\n\n80g pizza sauce or marinara\n\n75g low fat grated cheddar\n45g light mozzarella\n\n30g pepperoni\nRegular or turkey works too\n\n⸻\n\nCooking steps\n 1. Add the flour to a bowl first, then slowly mix in the Greek yoghurt until a dough forms. Add a little more flour if it’s too sticky.\n 2. Lightly flour a surface and rolling pin. Roll the dough out gently as thin and wide as you can without it breaking.\n 3. Place the mozzarella sticks around the edge, fold the dough over them and press to seal to make the stuffed crust.\n 4. Spread the pizza sauce over the base.\n 5. Add the grated cheeses and pepperoni.\n 6. Bake at 200°C for 15 to 20 minutes until golden and cooked through.\n 7. Let it cool slightly, slice it up and demolish it.\n\n⸻\n\nMacros from the original recipe\n883 calories\n81g protein\n\nCredit\nRecipe by @proteinprepper 👏\n\nPS\nPepperoni is definitely the best topping for any pizza. End of."}]},"showMoreText":{"accessibility":{"accessibilityData":{"label":"Show more"}},"simpleText":"...more"},"showLessText":{"simpleText":"Show less"},"backgroundColorStyle":"BACKGROUND_COLOR_STYLE_COLOR_SAMPLED"}},{"howThisWasMadeSectionViewModel":{"sectionTitle":{"content":"How this was made"},"bodyText":{"content":"Audio tracks for some languages were automatically generated. Learn more","commandRuns":[{"startIndex":62,"length":10,"onTap":{"innertubeCommand":{"clickTrackingParams":"CB8Qtp4MGAIiEwjem7HIkbiUAxWuWJ0GHeyvJxXKAQSXDWkH","commandMetadata":{"webCommandMetadata":{"url":"//support.google.com/youtube/answer/15569972?hl=en","webPageType":"WEB_PAGE_TYPE_UNKNOWN","roo geCode":"wo","languageName":{"simpleText":"Wolof"}},{"languageCode":"xh","languageName":{"simpleText":"Xhosa"}},{"languageCode":"yi","languageName":{"simpleText":"Yiddish"}},{"languageCode":"yo","languageName":{"simpleText":"Yoruba"}},{"languageCode":"zu","languageName":{"simpleText":"Zulu"}}],"defaultAudioTrackIndex":5}},"videoDetails":{"videoId":"KNRDr26Z5Vw","title":"High protein pepperoni pizza review","lengthSeconds":"92","channelId":"UCgYcPoQ7R_qrcQRJR_BpvSg","isOwnerViewing":false,"shortDescription":"Click the link in my bio to join my six week long, GYST fat loss challenge\n\nOf course this was delicious.\nIt’s pizza. 🍕\nHigh protein. Stuffed crust. Zero regrets.\n\n⸻\n\nIngredients\n\n110g self-raising flour\nIf using plain flour add 1.5 tsp baking powder\n\n100g low fat or fat free Greek yoghurt\n\n1 tsp Italian herb seasoning\n1 tsp garlic powder\n1 tsp salt\n\n7g nutritional yeast optional\n\n3 light mozzarella cheese sticks sliced lengthways\n\n80g pizza sauce or marinara\n\n75g low fat grated cheddar\n45g light mozzarella\n\n30g pepperoni\nRegular or turkey works too\n\n⸻\n\nCooking steps\n 1. Add the flour to a bowl first, then slowly mix in the Greek yoghurt until a dough forms. Add a little more flour if it’s too sticky.\n 2. Lightly flour a surface and rolling pin. Roll the dough out gently as thin and wide as you can without it breaking.\n 3. Place the mozzarella sticks around the edge, fold the dough over them and press to seal to make the stuffed crust.\n 4. Spread the pizza sauce over the base.\n 5. Add the grated cheeses and pepperoni.\n 6. Bake at 200°C for 15 to 20 minutes until golden and cooked through.\n 7. Let it cool slightly, slice it up and demolish it.\n\n⸻\n\nMacros from the original recipe\n883 calories\n81g protein\n\nCredit\nRecipe by @proteinprepper 👏\n\nPS\nPepperoni is definitely the best topping for any pizza. End of.","isCrawlable":true,"thumbnail":{"thumbnails":[{"url":"https://i.ytimg.com/vi/KNRDr26Z5Vw/hqdefault.jpg?sqp=- t’s pizza. 🍕\nHigh protein. Stuffed crust. Zero regrets.\n\n⸻\n\nIngredients\n\n110g self-raising flour\nIf using plain flour add 1.5 tsp baking powder\n\n100g low fat or fat free Greek yoghurt\n\n1 tsp Italian herb seasoning\n1 tsp garlic powder\n1 tsp salt\n\n7g nutritional yeast optional\n\n3 light mozzarella cheese sticks sliced lengthways\n\n80g pizza sauce or marinara\n\n75g low fat grated cheddar\n45g light mozzarella\n\n30g pepperoni\nRegular or turkey works too\n\n⸻\n\nCooking steps\n 1. Add the flour to a bowl first, then slowly mix in the Greek yoghurt until a dough forms. Add a little more flour if it’s too sticky.\n 2. Lightly flour a surface and rolling pin. Roll the dough out gently as thin and wide as you can without it breaking.\n 3. Place the mozzarella sticks around the edge, fold the dough over them and press to seal to make the stuffed crust.\n 4. Spread the pizza sauce over the base.\n 5. Add the grated cheeses and pepperoni.\n 6. Bake at 200°C for 15 to 20 minutes until golden and cooked through.\n 7. Let it cool slightly, slice it up and demolish it.\n\n⸻\n\nMacros from the original recipe\n883 calories\n81g protein\n\nCredit\nRecipe by @proteinprepper 👏\n\nPS\nPepperoni is definitely the best topping for any pizza. End of."},"lengthSeconds":"92","ownerProfileUrl":"http://www.youtube.com/@LouisHowardpt","externalChannelId":"UCgYcPoQ7R_qrcQRJR_BpvSg","isFamilySafe":true,"availableCountries":["AD","AE","AF","AG","AI","AL","AM","AO","AQ","AR","AS","AT","AU","AW","AX","AZ","BA","BB","BD","BE","BF","BG","BH","BI","BJ","BL","BM","BN","BO","BQ","BR","BS","BT","BV","BW","BY","BZ","CA","CC","CD","CF","CG","CH","CI","CK","CL","CM","CN","CO","CR","CU","CV","CW","CX","CY","CZ","DE","DJ","DK","DM","DO","DZ","EC","EE","EG","EH","ER","ES","ET","FI","FJ","FK","FM","FO","FR","GA","GB","GD","GE","GF","GG","GH","GI","GL","GM","GN","GP","GQ","GR","GS","GT","GU","GW","GY","HK","HM","HN","HR","HT","HU","ID","IE","IL","IM","IN","IO","IQ","IR","IS","IT","JE","JM","J
